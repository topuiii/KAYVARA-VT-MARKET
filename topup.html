<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAYVARA VT MARKET - TOP UP GAME</title>

<style>

body{
background:#0d0d0d;
color:white;
font-family:Arial,sans-serif;
margin:0;
}

header{
background:black;
padding:20px;
text-align:center;
border-bottom:3px solid gold;
}

h1{
color:gold;
}

.games{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:30px;
max-width:1400px;
margin:auto;
}

.game-card{
background:#1a1a1a;
border:1px solid #333;
border-radius:10px;
overflow:hidden;
cursor:pointer;
transition:.3s;
}

.game-card:hover{
border-color:gold;
transform:translateY(-5px);
}

.game-card img{
width:100%;
height:180px;
object-fit:cover;
}

.game-card h3{
text-align:center;
padding:15px;
color:gold;
}

.form-container{
max-width:900px;
margin:40px auto;
background:#1a1a1a;
padding:30px;
border-radius:10px;
display:none;
}

input,select{
width:100%;
padding:12px;
margin-top:8px;
margin-bottom:15px;
border:none;
border-radius:8px;
background:#333;
color:white;
}

.nominal{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:10px;
margin-top:10px;
}

.nominal label{
background:#222;
padding:15px;
border-radius:8px;
cursor:pointer;
display:block;
}

button{
width:100%;
padding:15px;
background:gold;
color:black;
font-weight:bold;
border:none;
border-radius:10px;
cursor:pointer;
margin-top:20px;
}

</style>
</head>
<body>

<header>
<h1>KAYVARA VT MARKET</h1>
<p>TOP UP GAME ONLINE</p>
</header>

<div class="games">

<div class="game-card" onclick="showML()">
<img src="https://via.placeholder.com/400x200?text=Mobile+Legends">
<h3>Mobile Legends</h3>
</div>

<div class="game-card" onclick="showFF()">
<img src="https://via.placeholder.com/400x200?text=Free+Fire">
<h3>Free Fire</h3>
</div>

<div class="game-card" onclick="showPUBG()">
<img src="https://via.placeholder.com/400x200?text=PUBG+Mobile">
<h3>PUBG Mobile</h3>
</div>

<div class="game-card" onclick="showValorant()">
<img src="https://via.placeholder.com/400x200?text=Valorant">
<h3>Valorant</h3>
</div>

<div class="game-card" onclick="showPB()">
<img src="https://via.placeholder.com/400x200?text=Point+Blank">
<h3>Point Blank</h3>
</div>

</div>

<div id="formArea" class="form-container"></div>

<script>

function showML(){

document.getElementById("formArea").style.display="block";

document.getElementById("formArea").innerHTML=`

<h2>Mobile Legends</h2>

<label>ID Game</label>
<input type="text">

<label>Zone ID</label>
<input type="text">

<h3>Pilih Diamond</h3>

<div class="nominal">

<label><input type="radio" name="ml"> 86 Diamond - Rp20.000</label>

<label><input type="radio" name="ml"> 172 Diamond - Rp40.000</label>

<label><input type="radio" name="ml"> 257 Diamond - Rp60.000</label>

<label><input type="radio" name="ml"> 344 Diamond - Rp80.000</label>

</div>

<button>BELI SEKARANG</button>

`;

}

function showFF(){

document.getElementById("formArea").style.display="block";

document.getElementById("formArea").innerHTML=`

<h2>Free Fire</h2>

<label>UID</label>
<input type="text">

<h3>Pilih Diamond</h3>

<div class="nominal">

<label><input type="radio" name="ff"> 70 Diamond - Rp10.000</label>

<label><input type="radio" name="ff"> 140 Diamond - Rp20.000</label>

<label><input type="radio" name="ff"> 355 Diamond - Rp50.000</label>

</div>

<button>BELI SEKARANG</button>

`;

}

function showPUBG(){

document.getElementById("formArea").style.display="block";

document.getElementById("formArea").innerHTML=`

<h2>PUBG Mobile</h2>

<label>Player ID</label>
<input type="text">

<div class="nominal">

<label><input type="radio" name="pubg"> 60 UC - Rp15.000</label>

<label><input type="radio" name="pubg"> 325 UC - Rp75.000</label>

<label><input type="radio" name="pubg"> 660 UC - Rp150.000</label>

</div>

<button>BELI SEKARANG</button>

`;

}

function showValorant(){

document.getElementById("formArea").style.display="block";

document.getElementById("formArea").innerHTML=`

<h2>Valorant</h2>

<label>Riot ID</label>
<input type="text">

<div class="nominal">

<label><input type="radio" name="valo"> 125 VP - Rp15.000</label>

<label><input type="radio" name="valo"> 420 VP - Rp50.000</label>

<label><input type="radio" name="valo"> 700 VP - Rp75.000</label>

</div>

<button>BELI SEKARANG</button>

`;

}

function showPB(){

document.getElementById("formArea").style.display="block";

document.getElementById("formArea").innerHTML=`

<h2>Point Blank</h2>

<label>ID Akun</label>
<input type="text">

<div class="nominal">

<label><input type="radio" name="pb"> 1200 Cash - Rp12.000</label>

<label><input type="radio" name="pb"> 6000 Cash - Rp60.000</label>

<label><input type="radio" name="pb"> 12000 Cash - Rp120.000</label>

</div>

<button>BELI SEKARANG</button>

`;

}

</script>

</body>
</html>
