<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register - KAYVARA VT MARKET</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="auth-container">
    <h1>Daftar Akun Baru</h1>
    <form id="registerForm">
        <label>Username</label>
        <input type="text" id="regUsername" placeholder="Masukkan username" required>
        <label>Email</label>
        <input type="email" id="regEmail" placeholder="Masukkan email" required>
        <label>Nomor HP</label>
        <input type="text" id="regHP" placeholder="Masukkan nomor HP" required>
        <label>Password Login</label>
        <input type="password" id="regPassword" placeholder="Masukkan password" required>
        <label>Password Keluarkan Duit (PIN)</label>
        <input type="password" id="regPin" placeholder="PIN tarik duit" required>
        <label>Kode Referral (opsional)</label>
        <input type="text" id="regReferral" placeholder="Kode referral">
        <button type="submit" class="btn-primary">Daftar</button>
    </form>
    <p>Sudah punya akun? <a href="login.html">Login di sini</a></p>
</div>
<script src="script.js"></script>
<script>
document.getElementById('registerForm').addEventListener('submit', registerMember);
</script>
</body>
</html>
