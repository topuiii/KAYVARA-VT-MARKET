<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - KAYVARA VT MARKET</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="auth-container">
    <h1>Masuk ke KAYVARA VT MARKET</h1>
    <form id="loginForm">
        <label for="username">Username</label>
        <input type="text" id="loginUsername" placeholder="Masukkan username" required>
        <label for="password">Password</label>
        <input type="password" id="loginPassword" placeholder="Masukkan password" required>
        <button type="submit" class="btn-primary">Login</button>
    </form>
    <p>Belum punya akun? <a href="register.html">Daftar di sini</a></p>
</div>
<script src="script.js"></script>
<script>
document.getElementById('loginForm').addEventListener('submit', loginUser);
</script>
</body>
</html>
